<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voxasign — Professional AI Gesture Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs" type="module"></script>
    <style>
      :root {
        --bg-dark: #020617;
        --card-glass: rgba(15, 23, 42, 0.8);
        --electric-blue: #38bdf8;
        --blue-glow: rgba(56, 189, 248, 0.2);
        --text-bright: #f1f5f9;
        --text-muted: #94a3b8;
        --border-glass: rgba(255, 255, 255, 0.1);
        --danger: #ef4444;
        --ai-purple: #a855f7;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Nunito", sans-serif;
        background: var(--bg-dark);
        background-image: radial-gradient(at 0% 0%, hsla(217, 100%, 12%, 1) 0, transparent 50%), radial-gradient(at 100% 100%, hsla(200, 100%, 10%, 1) 0, transparent 50%);
        min-height: 100vh;
        color: var(--text-bright);
        display: flex;
        flex-direction: column;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 15px 30px;
        background: var(--card-glass);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border-glass);
      }

      .logo-box { display: flex; align-items: center; gap: 12px; }
      .logo-icon {
        width: 42px; height: 42px;
        background: var(--blue-glow);
        border: 1.5px solid var(--electric-blue);
        border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        color: var(--electric-blue);
        box-shadow: 0 0 15px var(--blue-glow);
      }
      .logo-name { font-family: "Lora", serif; font-size: 1.4rem; font-weight: 600; }
      .logo-name span { color: var(--electric-blue); }

      main {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 400px;
        gap: 20px;
        padding: 20px;
        max-width: 1600px;
        margin: 0 auto;
        width: 100%;
      }

      .glass-panel {
        background: var(--card-glass);
        border: 1px solid var(--border-glass);
        border-radius: 24px;
        padding: 20px;
        backdrop-filter: blur(20px);
      }

      /* Learning Gallery Styling */
      .learn-tray {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
        gap: 10px;
        margin-top: 15px;
        max-height: 250px;
        overflow-y: auto;
        padding-right: 5px;
      }
      .sign-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border-glass);
        border-radius: 12px;
        padding: 8px;
        text-align: center;
        cursor: pointer;
        transition: 0.3s;
      }
      .sign-card:hover { border-color: var(--electric-blue); background: var(--blue-glow); }
      .sign-card img { width: 100%; border-radius: 6px; margin-bottom: 4px; }
      .sign-card span { font-weight: 800; font-size: 12px; }

      .workspace-card {
        position: relative;
        height: 450px;
        background: #000;
        border-radius: 20px;
        overflow: hidden;
        border: 1px solid var(--border-glass);
      }

      #webcam, #output_canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

      .btn-main {
        width: 100%;
        background: var(--electric-blue);
        color: var(--bg-dark);
        padding: 14px;
        border-radius: 14px;
        border: none;
        font-weight: 800;
        cursor: pointer;
        margin-bottom: 12px;
        transition: 0.3s;
      }
      .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--blue-glow); }

      .word-area {
        background: rgba(0, 0, 0, 0.3);
        padding: 15px;
        border-radius: 16px;
        min-height: 60px;
        font-family: "Lora";
        font-size: 1.4rem;
        color: var(--electric-blue);
        border: 1px solid var(--border-glass);
        margin: 15px 0;
      }

      .btn-sec {
        flex: 1;
        padding: 10px;
        border-radius: 10px;
        font-weight: 700;
        cursor: pointer;
        border: 1px solid;
        font-size: 13px;
        background: transparent;
      }

      @media (max-width: 1024px) { main { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <header>
      <div class="logo-box">
        <div class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0" /><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0" /><path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0" /><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15" />
          </svg>
        </div>
        <div class="logo-name">Voxa<span>sign</span></div>
      </div>
      <button class="btn-sec" style="border-color: var(--electric-blue); color: var(--electric-blue); max-width: 150px;" onclick="document.getElementById('learnSection').scrollIntoView({behavior: 'smooth'})">
        📚 Learn Signs
      </button>
    </header>

    <main>
      <div style="display: flex; flex-direction: column; gap: 20px">
        <div class="glass-panel workspace-card">
          <video id="webcam" autoplay playsinline></video>
          <canvas id="output_canvas"></canvas>
        </div>

        <div class="glass-panel" id="learnSection">
          <h3 style="font-size: 1.1rem; margin-bottom: 5px;">Sign Language Reference</h3>
          <p style="color: var(--text-muted); font-size: 12px;">Study these signs before starting the game!</p>
          <div class="learn-tray" id="learnTray">
            </div>
        </div>
      </div>

      <div style="display: flex; flex-direction: column; gap: 20px">
        <div class="glass-panel" style="text-align: center;">
          <span style="font-size: 10px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase;">Real-time Analysis</span>
          <div id="predBox" style="font-size: 4.5rem; color: var(--electric-blue); font-family: 'Lora'; margin: 10px 0;">–</div>
          <div style="height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin-bottom: 8px;">
            <div id="confFill" style="height: 100%; width: 0%; background: var(--electric-blue); transition: 0.3s;"></div>
          </div>
          <div id="confText" style="font-size: 12px; color: var(--text-muted)">Show your hand to the camera</div>
        </div>

        <div class="glass-panel">
          <button class="btn-main" id="submitBtn">ADD GESTURE TO WORD</button>
          
          <div class="word-area" id="wordArea">Start signing…</div>

          <div style="display: flex; gap: 10px;">
            <button class="btn-sec" id="aiContextBtn" style="border-color: var(--ai-purple); color: var(--ai-purple); background: rgba(168, 85, 247, 0.1);">AI Context ✨</button>
            <button class="btn-sec" id="generateBtn" style="border-color: var(--electric-blue); color: var(--electric-blue);">Speak 🔊</button>
          </div>
          <button id="clearBtn" style="width: 100%; background: transparent; border: none; color: var(--danger); margin-top: 15px; cursor: pointer; font-size: 12px; font-weight: 700;">Reset Session</button>
        </div>

        <div class="glass-panel" style="display: flex; justify-content: space-around; padding: 15px;">
           <div style="text-align:center"><div id="statL" style="color: var(--electric-blue); font-weight: 700; font-size: 1.2rem;">0</div><small style="font-size: 9px; color: var(--text-muted);">LETTERS</small></div>
           <div style="text-align:center"><div id="statW" style="color: var(--electric-blue); font-weight: 700; font-size: 1.2rem;">0%</div><small style="font-size: 9px; color: var(--text-muted);">SUCCESS SCORE</small></div>
        </div>
      </div>
    </main>

    <footer>Voxasign SaaS Engine v1.0 — Proudly built for the community</footer>

    <script type="module">
      // 1. Initialize Learning Tray
      const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
      const tray = document.getElementById('learnTray');
      alphabet.forEach(letter => {
        const card = document.createElement('div');
        card.className = 'sign-card';
        // Ensure you have signs/a.png, signs/b.png etc. in your project
        card.innerHTML = `<img src="signs/${letter.toLowerCase()}.png" alt="${letter}"><span>${letter}</span>`;
        tray.appendChild(card);
      });

      // 2. AI Implementation (Pointing to Netlify Proxy)
      document.getElementById("aiContextBtn").addEventListener("click", async () => {
        const word = document.getElementById("wordArea").textContent;
        if (word.length < 2 || word === "Start signing…") return alert("Please sign at least 2 letters first!");

        const btn = document.getElementById("aiContextBtn");
        btn.innerText = "Thinking...";
        btn.disabled = true;

        try {
          const response = await fetch("/ai-proxy", { // This calls your Netlify Edge Function
            method: "POST",
            body: JSON.stringify({ text: word })
          });
          const data = await response.json();
          const sentence = data.sentence;

          document.getElementById("wordArea").textContent = sentence;
          window.speechSynthesis.speak(new SpeechSynthesisUtterance(sentence));
        } catch (e) {
          alert("AI connection failed. Check your Netlify environment variables.");
        } finally {
          btn.innerText = "AI Context ✨";
          btn.disabled = false;
        }
      });
    </script>
    <script src="script.js" type="module"></script>
  </body>
</html>
